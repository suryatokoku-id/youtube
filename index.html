<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Promosi Suryatokoku</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    display:flex;
    flex-direction:column;
}

/* ======================
   HEADER
====================== */

.header{
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-bottom:1px solid #333;
}

.searchBox{
    flex:1;
    height:40px;
    padding:0 12px;
    border:none;
    border-radius:6px;
    outline:none;
}

.btn{
    height:40px;
    padding:0 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.btn-search{
    background:#ff0000;
    color:white;
}

.btn-fullscreen{
    background:#2196f3;
    color:white;
}

/* ======================
   CONTENT
====================== */

.main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* ======================
   HASIL PENCARIAN
====================== */

.sidebar{
    width:350px;
    background:#111;
    overflow-y:auto;
    border-right:1px solid #333;
}

.resultItem{
    display:flex;
    gap:10px;
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.resultItem:hover{
    background:#1e1e1e;
}

.resultItem img{
    width:120px;
    height:90px;
    object-fit:cover;
    border-radius:4px;
}

.resultTitle{
    color:white;
    font-size:14px;
    line-height:1.4;
}

/* ======================
   PLAYER
====================== */

.playerArea{
    flex:1;
    position:relative;
    background:black;
}

#player{
    width:100%;
    height:100%;
}

/* ======================
   STATUS
====================== */

.status{
    position:absolute;
    top:10px;
    left:10px;
    z-index:999;
    background:rgba(0,0,0,.7);
    color:white;
    padding:8px 12px;
    border-radius:6px;
    font-size:14px;
}

.loading{
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<div class="header">

    <input
        type="text"
        id="searchInput"
        class="searchBox"
        placeholder="Cari video YouTube..."
    >

    <button
        class="btn btn-search"
        onclick="searchYoutube()"
    >
        Cari
    </button>

    <button
        class="btn btn-fullscreen"
        onclick="toggleFullscreen()"
    >
        Fullscreen
    </button>

</div>

<div class="main">

    <div class="sidebar" id="results">

        <div class="loading">
            Cari video YouTube terlebih dahulu
        </div>

    </div>

    <div class="playerArea">

        <div class="status" id="status">
            Menunggu Video...
        </div>

        <div id="player"></div>

    </div>

</div>

<audio id="promoPlayer"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* ======================
   KONFIGURASI
====================== */

const API_KEY = "AIzaSyC1hk5cVDGyVh6mvVTVE9mF_2bS5WN52Dw";

/*
UPLOAD FILE MP3 KE:

audio/promo-carnival.mp3
audio/promo-minyak.mp3
audio/promo-member.mp3
*/

const jadwalPromo = [

    {
        waktu:"10:00",
        audio:"audio/promo-carnival.mp3"
    },

    {
        waktu:"12:00",
        audio:"audio/promo-minyak.mp3"
    },

    {
        waktu:"15:00",
        audio:"audio/promo-member.mp3"
    }

];

let player;
let currentVideoId = "";
let lastPlayed = "";

const statusBox =
    document.getElementById("status");

const promoPlayer =
    document.getElementById("promoPlayer");

<script>

/* ======================
   KONFIGURASI
====================== */

...
const promoPlayer =
    document.getElementById("promoPlayer");


/* ======================
   YOUTUBE PLAYER
====================== */

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player', {

        height:'100%',
        width:'100%',

        videoId:'M7lc1UVf-VE',

        playerVars:{
            autoplay:1,
            controls:1,
            rel:0,
            modestbranding:1
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }

    });

}

function onPlayerReady(event){

    statusBox.innerHTML = "Video Aktif";

}

function onPlayerStateChange(event){

    if(event.data === YT.PlayerState.PLAYING){

        statusBox.innerHTML = "Video Aktif";

    }

}

/* ======================
   SEARCH YOUTUBE
====================== */

async function searchYoutube(){

    const keyword =
        document.getElementById("searchInput")
        .value
        .trim();

    if(!keyword){

        alert("Masukkan kata pencarian");

        return;
    }

    const resultsDiv =
        document.getElementById("results");

    resultsDiv.innerHTML =
        "<div class='loading'>Mencari...</div>";

    try{

        const url =
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(keyword)}&key=${API_KEY}`;

        const response =
            await fetch(url);

        const data =
            await response.json();

        tampilkanHasil(data.items);

    }catch(err){

        console.error(err);

        resultsDiv.innerHTML =
        "<div class='loading'>Gagal mengambil data</div>";

    }

}

function tampilkanHasil(items){

    const resultsDiv =
        document.getElementById("results");

    resultsDiv.innerHTML = "";

    items.forEach(item=>{

        const videoId =
            item.id.videoId;

        const title =
            item.snippet.title;

        const thumb =
            item.snippet.thumbnails.medium.url;

        const div =
            document.createElement("div");

        div.className =
            "resultItem";

        div.innerHTML = `
            <img src="${thumb}">
            <div class="resultTitle">
                ${title}
            </div>
        `;

        div.onclick = ()=>{

            loadVideo(videoId);

        };

        resultsDiv.appendChild(div);

    });

}

/* ======================
   LOAD VIDEO
====================== */

function loadVideo(videoId){

    currentVideoId =
        videoId;

    player.loadVideoById(videoId);

    statusBox.innerHTML =
        "Memutar Video";

}

/* ======================
   ENTER KEY SEARCH
====================== */

document
.getElementById("searchInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        searchYoutube();

    }

});

/* ======================
   FULLSCREEN
====================== */

function toggleFullscreen(){

    if(!document.fullscreenElement){

        document.documentElement
        .requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}

/* ======================
   CEK JADWAL PROMO
====================== */

setInterval(()=>{

    const now =
        new Date();

    const jam =
        String(now.getHours())
        .padStart(2,'0');

    const menit =
        String(now.getMinutes())
        .padStart(2,'0');

    const waktuSekarang =
        jam + ":" + menit;

    jadwalPromo.forEach(promo=>{

        const uniqueKey =
            waktuSekarang +
            promo.audio;

        if(
            promo.waktu === waktuSekarang &&
            lastPlayed !== uniqueKey
        ){

            lastPlayed =
                uniqueKey;

            jalankanPromo(promo);

        }

    });

},1000);

/* ======================
   PLAY PROMO
====================== */

function jalankanPromo(promo){

    statusBox.innerHTML =
        "Memutar Promosi";

    if(player){

        player.pauseVideo();

    }

    promoPlayer.src =
        promo.audio;

    promoPlayer.play();

    promoPlayer.onended = ()=>{

        statusBox.innerHTML =
            "Video Aktif";

        if(player){

            player.playVideo();

        }

    };

}

</script>
</body>
</html>
