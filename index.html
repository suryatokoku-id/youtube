<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Promosi Suryatokoku</title>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#player{
    width:100vw;
    height:100vh;
}

#status{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
    background:rgba(0,0,0,.7);
    color:#fff;
    padding:8px 12px;
    border-radius:8px;
    font-family:Arial;
    font-size:14px;
}

</style>
</head>

<body>

<div id="status">
    Menunggu Video...
</div>

<div id="player"></div>

<audio id="promoPlayer"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

let lastPlayed = "";

const statusBox = document.getElementById("status");

const promoPlayer = document.getElementById("promoPlayer");

/*
|--------------------------------------------------------------------------
| JADWAL PROMOSI
|--------------------------------------------------------------------------
*/

const jadwalPromo = [

    {
        waktu: "10:00",
        audio: "audio/promo-carnival.mp3"
    },

    {
        waktu: "12:00",
        audio: "audio/promo-minyak.mp3"
    },

    {
        waktu: "15:00",
        audio: "audio/promo-member.mp3"
    },

    {
        waktu: "17:00",
        audio: "audio/promo-cbs.mp3"
    }

];

/*
|--------------------------------------------------------------------------
| YOUTUBE PLAYER
|--------------------------------------------------------------------------
*/

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player', {

        videoId: 'M7lc1UVf-VE',

        playerVars:{
            autoplay:1,
            controls:0,
            rel:0,
            modestbranding:1,
            fs:0
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }

    });

}

function onPlayerReady(event){

    event.target.playVideo();

    statusBox.innerHTML =
        "Video Aktif";

}

function onPlayerStateChange(event){

    if(event.data === YT.PlayerState.ENDED){

        player.playVideo();

    }

}

/*
|--------------------------------------------------------------------------
| CEK JADWAL PROMO
|--------------------------------------------------------------------------
*/

setInterval(() => {

    const now = new Date();

    const jam =
        String(now.getHours()).padStart(2,'0');

    const menit =
        String(now.getMinutes()).padStart(2,'0');

    const waktuSekarang =
        jam + ":" + menit;

    jadwalPromo.forEach(promo => {

        const uniqueKey =
            waktuSekarang + promo.audio;

        if(
            promo.waktu === waktuSekarang &&
            lastPlayed !== uniqueKey
        ){

            lastPlayed = uniqueKey;

            jalankanPromo(promo);

        }

    });

},1000);

/*
|--------------------------------------------------------------------------
| MAIN FUNCTION
|--------------------------------------------------------------------------
*/

function jalankanPromo(promo){

    statusBox.innerHTML =
        "Memutar Promosi...";

    player.pauseVideo();

    promoPlayer.src = promo.audio;

    promoPlayer.play();

    promoPlayer.onended = () => {

        statusBox.innerHTML =
            "Video Aktif";

        player.playVideo();

    };

}

</script>

</body>
</html>
